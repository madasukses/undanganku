<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Memuat...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#0f0e0d;color:#f0ece4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#c9a96e;display:inline-block;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
p{font-size:13px;letter-spacing:2px;color:#8a8278}
</style>
</head>
<body>
<div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
<p>Memuat...</p>
<script>
const SUPABASE_URL  = 'https://dwrxehnyjfzighzysosw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cnhlaG55amZ6aWdoenlzb3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MzYwMjUsImV4cCI6MjA5NjIxMjAyNX0.lPPsnhRpyDcFhUvrbxJEMc7DAjlM-BMyICOVi9KPqWc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: {
    detectSessionInUrl: true,
    flowType: 'pkce'
  }
});

async function redirect(role) {
  const map = {
    admin:    '/admin/dashboard.html',
    reseller: '/reseller/dashboard.html',
    customer: '/customer/dashboard.html'
  };
  window.location.href = map[role] || '/customer/dashboard.html';
}

(async () => {
  // Supabase otomatis proses code dari URL saat detectSessionInUrl: true
  // Tunggu sebentar biar dia selesai proses
  await new Promise(r => setTimeout(r, 500));

  const { data: { session }, error } = await sb.auth.getSession();

  if (error || !session) {
    // Coba sekali lagi setelah 1 detik
    await new Promise(r => setTimeout(r, 1000));
    const { data: { session: s2 } } = await sb.auth.getSession();
    if (!s2) {
      window.location.href = '/login.html';
      return;
    }
  }

  const { data: { session: sess } } = await sb.auth.getSession();
  const uid   = sess.user.id;
  const email = sess.user.email;
  const nama  = sess.user.user_metadata?.full_name || '';
  const avatar= sess.user.user_metadata?.avatar_url || '';

  // Upsert profile
  await sb.from('profiles').upsert({
    id: uid, email, nama, avatar_url: avatar
  }, { onConflict: 'id', ignoreDuplicates: true });

  // Ambil role
  const { data: profile } = await sb
    .from('profiles')
    .select('role')
    .eq('id', uid)
    .single();

  redirect(profile?.role || 'customer');
})();
</script>
</body>
</html>
