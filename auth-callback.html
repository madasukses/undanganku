<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Memuat...</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body{font-family:sans-serif;background:#0f0e0d;color:#f0ece4;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;flex-direction:column;gap:12px}
.dot{width:8px;height:8px;border-radius:50%;background:#c9a96e;display:inline-block;animation:bounce 1.2s infinite}
.dot:nth-child(2){animation-delay:.2s}.dot:nth-child(3){animation-delay:.4s}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
p{font-size:13px;letter-spacing:2px;color:#8a8278}
</style>
</head>
<body>
<div><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>
<p>Memuat...</p>
<script>
const SUPABASE_URL  = 'https://dwrxehnyjfzighzysosw.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImR3cnhlaG55amZ6aWdoenlzb3N3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA2MzYwMjUsImV4cCI6MjA5NjIxMjAyNX0.lPPsnhRpyDcFhUvrbxJEMc7DAjlM-BMyICOVi9KPqWc';

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON, {
  auth: { detectSessionInUrl: true }
});

(async () => {
  // Tunggu Supabase proses hash dari URL
  const { data, error } = await sb.auth.getSession();

  if (error) {
    console.error(error);
    window.location.href = '/login.html?error=' + encodeURIComponent(error.message);
    return;
  }

  if (!data.session) {
    // Coba exchange code jika pakai PKCE flow
    const { data: d2, error: e2 } = await sb.auth.exchangeCodeForSession(window.location.href);
    if (e2 || !d2?.session) {
      window.location.href = '/login.html';
      return;
    }
  }

  // Ambil atau buat profile
  const session = data.session || (await sb.auth.getSession()).data.session;
  const uid = session.user.id;
  const email = session.user.email;
  const nama = session.user.user_metadata?.full_name || '';
  const avatar = session.user.user_metadata?.avatar_url || '';

  const { data: profile, error: perr } = await sb
    .from('profiles')
    .select('role')
    .eq('id', uid)
    .single();

  if (!profile) {
    await sb.from('profiles').upsert({ id: uid, email, nama, avatar_url: avatar, role: 'customer' });
    window.location.href = '/customer/dashboard.html';
    return;
  }

  const map = { admin: '/admin/dashboard.html', reseller: '/reseller/dashboard.html', customer: '/customer/dashboard.html' };
  window.location.href = map[profile.role] || '/customer/dashboard.html';
})();
</script>
</body>
</html>
